<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel in Albis</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #050d14;
  --cyan: #00ffe7;
  --cyan-dim: #00bfad;
  --cyan-glow: rgba(0,255,231,0.18);
  --cyan-faint: rgba(0,255,231,0.07);
  --muted: #4a7a80;
  --bg: #060e14;
  --surface: #0a1620;
  --surface2: #0d1e2b;
  --border: #0e2d38;
  --border-bright: #1a4f5e;
  --green: #00ff99;
  --orange: #ff8c00;
  --blue: #00b4ff;
  --red: #ff3355;
  --text: #b0d8e0;
  --text-bright: #e0f7fa;
}

@keyframes flickerGlow {
  0%,100% { text-shadow: 0 0 8px var(--cyan), 0 0 20px var(--cyan), 0 0 40px var(--cyan-dim); opacity: 1; }
  92%      { opacity: 1; }
  93%      { opacity: .7; }
  94%      { opacity: 1; }
  96%      { opacity: .85; }
  97%      { opacity: 1; }
}
@keyframes borderPulse {
  0%,100% { box-shadow: 0 0 0 0 var(--cyan-glow), inset 0 0 12px var(--cyan-faint); border-color: var(--border-bright); }
  50%     { box-shadow: 0 0 12px 2px var(--cyan-glow), inset 0 0 20px var(--cyan-faint); border-color: var(--cyan-dim); }
}
@keyframes scanline {
  0%   { transform: translateY(-100%); }
  100% { transform: translateY(100vh); }
}
@keyframes cyberFadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,231,0.015) 2px,
      rgba(0,255,231,0.015) 4px
    );
}

/* ── SCANLINE ── */
body::after {
  content: '';
  position: fixed; left: 0; right: 0; height: 80px;
  background: linear-gradient(transparent, rgba(0,255,231,0.04) 50%, transparent);
  z-index: 1; pointer-events: none;
  animation: scanline 7s linear infinite;
}

/* ── LOGIN ── */
#loginScreen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background:
    radial-gradient(ellipse at 50% 40%, rgba(0,255,231,0.07) 0%, transparent 60%),
    linear-gradient(160deg, #020a10 0%, #060e18 60%, #020a10 100%);
  position: relative; z-index: 10;
}
.login-box {
  background: var(--surface);
  border: 1px solid var(--border-bright);
  border-radius: 4px; padding: 40px 32px;
  box-shadow: 0 0 40px rgba(0,255,231,0.1), 0 24px 60px rgba(0,0,0,.6);
  width: 100%; max-width: 360px;
  animation: borderPulse 3s ease-in-out infinite, cyberFadeIn .5s ease both;
  position: relative;
}
.login-box::before {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
}
.login-logo {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; margin-bottom: 28px;
}
.login-logo-mark {
  width: 44px; height: 44px; background: transparent;
  border: 2px solid var(--cyan); border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: var(--cyan); font-family: 'Orbitron', sans-serif;
  font-size: 12px; font-weight: 900; letter-spacing: -1px;
  box-shadow: 0 0 12px var(--cyan-glow), inset 0 0 8px var(--cyan-faint);
  animation: flickerGlow 5s ease-in-out infinite;
}
.login-logo-text {
  font-family: 'Orbitron', sans-serif; font-size: 1.2rem;
  color: var(--cyan); letter-spacing: 2px;
  animation: flickerGlow 5s ease-in-out infinite;
}
.login-subtitle {
  text-align: center; color: var(--muted); font-family: 'Share Tech Mono', monospace;
  font-size: .72rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 28px;
}
.lfield { margin-bottom: 14px; }
.lfield label {
  display: block; font-family: 'Share Tech Mono', monospace; font-size: .68rem;
  color: var(--cyan-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px;
}
.lfield input {
  width: 100%; padding: 11px 14px;
  border: 1px solid var(--border-bright); border-radius: 3px;
  font-family: 'Share Tech Mono', monospace; font-size: .88rem;
  background: var(--surface2); color: var(--text-bright); transition: .2s;
}
.lfield input::placeholder { color: var(--muted); }
.lfield input:focus {
  outline: none; border-color: var(--cyan);
  box-shadow: 0 0 10px var(--cyan-glow);
  color: var(--cyan);
}
.btn-login {
  width: 100%; padding: 13px; background: transparent;
  border: 1.5px solid var(--cyan); border-radius: 3px;
  font-family: 'Orbitron', sans-serif; color: var(--cyan);
  font-weight: 700; font-size: .82rem; cursor: pointer; margin-top: 8px; transition: .25s;
  letter-spacing: 2px; text-transform: uppercase;
  box-shadow: 0 0 12px var(--cyan-glow);
}
.btn-login:hover {
  background: var(--cyan); color: var(--ink);
  box-shadow: 0 0 24px var(--cyan), 0 0 48px var(--cyan-glow);
}
.login-err {
  color: var(--red); font-family: 'Share Tech Mono', monospace;
  font-size: .75rem; margin-top: 10px; text-align: center; display: none;
  text-shadow: 0 0 8px var(--red);
}

/* ── APP ── */
#adminApp { display: none; position: relative; z-index: 10; }
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border-bright);
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 20px rgba(0,255,231,0.08);
}
.topbar-logo { display: flex; align-items: center; gap: 10px; }
.topbar-mark {
  width: 32px; height: 32px;
  border: 2px solid var(--cyan); border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  color: var(--cyan); font-family: 'Orbitron', sans-serif;
  font-size: 9px; font-weight: 900;
  box-shadow: 0 0 10px var(--cyan-glow), inset 0 0 6px var(--cyan-faint);
}
.topbar-name {
  font-family: 'Orbitron', sans-serif; color: var(--cyan);
  font-size: 1rem; letter-spacing: 3px;
  animation: flickerGlow 6s ease-in-out infinite;
}
.btn-logout {
  padding: 6px 14px; background: transparent;
  border: 1px solid var(--border-bright); border-radius: 3px;
  color: var(--muted); font-family: 'Share Tech Mono', monospace;
  font-size: .72rem; cursor: pointer; transition: .2s; letter-spacing: 1px;
}
.btn-logout:hover { background: var(--red); color: #fff; border-color: var(--red); box-shadow: 0 0 12px rgba(255,51,85,.4); }

.tabs {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 24px; display: flex; gap: 4px;
}
.tab-btn {
  padding: 14px 18px; border: none; background: none;
  font-family: 'Share Tech Mono', monospace;
  font-size: .8rem; color: var(--muted); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px; transition: .2s;
  letter-spacing: 1px;
}
.tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }

.tab-pane { display: none; padding: 24px; }
.tab-pane.active { display: block; animation: cyberFadeIn .3s ease both; }

/* ── STATS ── */
.stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 12px; margin-bottom: 24px; }
.stat {
  background: var(--surface); border: 1px solid var(--border-bright); border-radius: 4px;
  padding: 14px 16px; text-align: center;
  animation: borderPulse 4s ease-in-out infinite;
}
.stat:nth-child(2) { animation-delay: .8s; }
.stat:nth-child(3) { animation-delay: 1.6s; }
.stat:nth-child(4) { animation-delay: 2.4s; }
.stat-n {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.8rem; font-weight: 900;
  color: var(--cyan); line-height: 1;
  text-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan-dim);
}
.stat-l {
  font-family: 'Share Tech Mono', monospace;
  font-size: .6rem; color: var(--muted); text-transform: uppercase;
  letter-spacing: 1.5px; margin-top: 6px;
}

/* ── FILTERS ── */
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.filter-btn {
  padding: 6px 14px; border: 1px solid var(--border-bright); background: transparent;
  border-radius: 2px; font-family: 'Share Tech Mono', monospace;
  font-size: .72rem; color: var(--muted); cursor: pointer; transition: .2s; letter-spacing: 1px;
}
.filter-btn.active {
  background: var(--cyan-faint); color: var(--cyan); border-color: var(--cyan);
  box-shadow: 0 0 10px var(--cyan-glow);
}
.filter-btn:hover:not(.active) { border-color: var(--cyan-dim); color: var(--cyan-dim); }
.search-input {
  padding: 7px 14px; border: 1px solid var(--border-bright); border-radius: 2px;
  font-family: 'Share Tech Mono', monospace; font-size: .78rem;
  width: 200px; transition: .2s; margin-left: auto;
  background: var(--surface2); color: var(--text-bright);
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 8px var(--cyan-glow); color: var(--cyan); }

/* ── PROJECT CARDS ── */
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 14px; }
.proj-card {
  background: var(--surface); border: 1px solid var(--border-bright); border-radius: 4px;
  padding: 18px; cursor: pointer; transition: .25s; position: relative; overflow: hidden;
}
.proj-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan-dim), transparent);
  opacity: 0; transition: .25s;
}
.proj-card:hover {
  border-color: var(--cyan);
  box-shadow: 0 0 20px var(--cyan-glow), 0 4px 16px rgba(0,0,0,.4);
  transform: translateY(-2px);
}
.proj-card:hover::before { opacity: 1; }
.proj-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.proj-name { font-weight: 800; font-size: .95rem; color: var(--text-bright); }
.proj-type { font-family: 'Share Tech Mono', monospace; font-size: .68rem; color: var(--muted); margin-top: 3px; letter-spacing: .5px; }
.proj-date { font-family: 'Share Tech Mono', monospace; font-size: .65rem; color: var(--muted); white-space: nowrap; }
.proj-email { font-family: 'Share Tech Mono', monospace; font-size: .74rem; color: var(--cyan-dim); margin-bottom: 12px; }
.proj-footer { display: flex; align-items: center; justify-content: space-between; }
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 2px;
  font-family: 'Share Tech Mono', monospace;
  font-size: .6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
}
.badge-pending     { background: rgba(255,140,0,.12); color: var(--orange); border: 1px solid rgba(255,140,0,.3); }
.badge-in_progress { background: rgba(0,180,255,.12);  color: var(--blue);   border: 1px solid rgba(0,180,255,.3); }
.badge-completed   { background: rgba(0,255,153,.1);   color: var(--green);  border: 1px solid rgba(0,255,153,.25); }
.badge-archived    { background: rgba(74,122,128,.1);  color: var(--muted);  border: 1px solid var(--border); }
.proj-notes { font-family: 'Share Tech Mono', monospace; font-size: .68rem; color: var(--muted); }

/* ── DETAIL PANEL ── */
.detail-overlay {
  position: fixed; inset: 0; background: rgba(2,8,14,.7); z-index: 200;
  display: none; align-items: flex-start; justify-content: flex-end;
  backdrop-filter: blur(2px);
}
.detail-overlay.open { display: flex; }
.detail-panel {
  background: var(--surface); width: 100%; max-width: 480px; height: 100vh;
  overflow-y: auto; padding: 24px;
  border-left: 1px solid var(--border-bright);
  box-shadow: -8px 0 40px rgba(0,255,231,0.08), -4px 0 80px rgba(0,0,0,.5);
  animation: cyberFadeIn .25s ease both;
}
.detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.detail-title { font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700; color: var(--cyan); letter-spacing: 1px; }
.btn-close {
  background: none; border: 1px solid var(--border-bright); border-radius: 3px;
  font-size: 1rem; cursor: pointer; color: var(--muted); padding: 4px 8px; transition: .2s;
}
.btn-close:hover { border-color: var(--red); color: var(--red); box-shadow: 0 0 8px rgba(255,51,85,.3); }
.detail-section { margin-bottom: 20px; }
.detail-section-title {
  font-family: 'Share Tech Mono', monospace;
  font-size: .62rem; color: var(--cyan-dim);
  text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px;
  padding-bottom: 6px; border-bottom: 1px solid var(--border-bright);
}
.detail-row { display: flex; gap: 8px; margin-bottom: 8px; }
.detail-label { font-family: 'Share Tech Mono', monospace; font-size: .68rem; color: var(--muted); min-width: 80px; }
.detail-value { font-size: .82rem; font-weight: 700; color: var(--text-bright); flex: 1; }

.status-select {
  padding: 7px 12px; border: 1px solid var(--border-bright); border-radius: 3px;
  font-family: 'Share Tech Mono', monospace; font-size: .78rem;
  cursor: pointer; transition: .2s;
  background: var(--surface2); color: var(--text-bright);
}
.status-select:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 8px var(--cyan-glow); }

/* ── NOTES ── */
.note {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 3px;
  padding: 10px 12px; margin-bottom: 8px;
  border-left: 2px solid var(--cyan-dim);
}
.note-text { font-size: .82rem; color: var(--text); line-height: 1.6; }
.note-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
.note-date { font-family: 'Share Tech Mono', monospace; font-size: .63rem; color: var(--muted); }
.btn-del-note { background: none; border: none; color: var(--red); font-family: 'Share Tech Mono', monospace; font-size: .7rem; cursor: pointer; transition: .15s; }
.btn-del-note:hover { text-shadow: 0 0 8px var(--red); }
.note-input-wrap { display: flex; gap: 8px; margin-top: 10px; }
.note-input {
  flex: 1; padding: 9px 12px; border: 1px solid var(--border-bright); border-radius: 3px;
  font-family: 'Nunito', sans-serif; font-size: .82rem;
  background: var(--surface2); color: var(--text-bright);
  resize: none;
}
.note-input::placeholder { color: var(--muted); }
.note-input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 8px var(--cyan-glow); }
.btn-note {
  padding: 9px 16px; background: transparent; color: var(--cyan);
  border: 1.5px solid var(--cyan); border-radius: 3px;
  font-family: 'Share Tech Mono', monospace;
  font-size: .75rem; cursor: pointer; white-space: nowrap; transition: .2s; letter-spacing: 1px;
}
.btn-note:hover { background: var(--cyan); color: var(--ink); box-shadow: 0 0 14px var(--cyan-glow); }

.loading { text-align: center; padding: 48px; color: var(--muted); font-family: 'Share Tech Mono', monospace; letter-spacing: 2px; }
.empty { text-align: center; padding: 48px; color: var(--muted); font-family: 'Share Tech Mono', monospace; font-size: .84rem; letter-spacing: 1px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-mark">i A</div>
      <div class="login-logo-text">in Albis</div>
    </div>
    <div class="login-subtitle">Panel de Administración</div>
    <div class="lfield">
      <label>Usuario</label>
      <input type="text" id="loginUser" placeholder="admin" autocomplete="username">
    </div>
    <div class="lfield">
      <label>Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" onclick="doLogin()">Ingresar</button>
    <div class="login-err" id="loginErr">Usuario o contraseña incorrectos</div>
  </div>
</div>

<!-- APP -->
<div id="adminApp">
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-mark">iA</div>
      <div class="topbar-name">in Albis</div>
    </div>
    <button class="btn-logout" onclick="doLogout()">Cerrar sesión</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('proyectos', this)">PROYECTOS</button>
  </div>

  <div id="tab-proyectos" class="tab-pane active">
    <div class="stats">
      <div class="stat"><div class="stat-n" id="stTotal">–</div><div class="stat-l">Total</div></div>
      <div class="stat"><div class="stat-n" id="stPending">–</div><div class="stat-l">Pendientes</div></div>
      <div class="stat"><div class="stat-n" id="stProgress">–</div><div class="stat-l">En curso</div></div>
      <div class="stat"><div class="stat-n" id="stDone">–</div><div class="stat-l">Completos</div></div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="filterStatus('', this)">Todos</button>
      <button class="filter-btn" onclick="filterStatus('pending', this)">Pendientes</button>
      <button class="filter-btn" onclick="filterStatus('in_progress', this)">En curso</button>
      <button class="filter-btn" onclick="filterStatus('completed', this)">Completos</button>
      <button class="filter-btn" onclick="filterStatus('archived', this)">Archivados</button>
      <input class="search-input" type="text" placeholder=" Buscar..." oninput="searchProjects(this.value)">
    </div>

    <div class="projects-grid" id="projGrid">
      <div class="loading">Cargando proyectos...</div>
    </div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">
      <div class="detail-title" id="detailTitle">–</div>
      <button class="btn-close" onclick="closeDetailPanel()">✕</button>
    </div>
    <div id="detailContent"></div>
  </div>
</div>

<script>
const ADMIN_USER = 'admin';
const ADMIN_PASS = 'Archy44';
const API = '/api/admin';

let allProjects = [];
let currentFilter = '';

// ── AUTH ──────────────────────────────────────────────────
function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    sessionStorage.setItem('ia_admin', '1');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').style.display = 'block';
    loadProjects();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function doLogout() {
  sessionStorage.removeItem('ia_admin');
  location.reload();
}

window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('ia_admin')) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').style.display = 'block';
    loadProjects();
  }
  ['loginUser','loginPass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  });
});

// ── PROJECTS ──────────────────────────────────────────────
async function loadProjects() {
  try {
    const res = await fetch(`${API}/projects`);
    const data = await res.json();
    allProjects = data.projects || [];
    updateStats(allProjects);
    renderProjects(allProjects);
  } catch {
    document.getElementById('projGrid').innerHTML = '<div class="empty">Error al cargar. Verificá que el Worker esté desplegado.</div>';
  }
}

function updateStats(projects) {
  document.getElementById('stTotal').textContent    = projects.length;
  document.getElementById('stPending').textContent  = projects.filter(p => p.status === 'pending').length;
  document.getElementById('stProgress').textContent = projects.filter(p => p.status === 'in_progress').length;
  document.getElementById('stDone').textContent     = projects.filter(p => p.status === 'completed').length;
}

function renderProjects(projects) {
  const grid = document.getElementById('projGrid');
  if (!projects.length) { grid.innerHTML = '<div class="empty">No hay proyectos aún.</div>'; return; }
  grid.innerHTML = projects.map(p => {
    const fd = p.form_data || {};
    const date = new Date(p.created_at).toLocaleDateString('es-AR', { day:'numeric', month:'short', year:'numeric' });
    return `
    <div class="proj-card" onclick="openDetail(${p.id})">
      <div class="proj-card-top">
        <div>
          <div class="proj-name">${p.client_name}</div>
          <div class="proj-type">${fd.business_type || '—'}</div>
        </div>
        <div class="proj-date">${date}</div>
      </div>
      <div class="proj-email">${fd.email || '—'}</div>
      <div class="proj-footer">
        <span class="badge badge-${p.status}">${statusLabel(p.status)}</span>
        <span class="proj-notes">${p.notes_count || 0} nota${p.notes_count !== 1 ? 's' : ''}</span>
      </div>
    </div>`;
  }).join('');
}

function filterStatus(status, btn) {
  currentFilter = status;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = status ? allProjects.filter(p => p.status === status) : allProjects;
  renderProjects(filtered);
}

function searchProjects(q) {
  const filtered = allProjects.filter(p => {
    const fd = p.form_data || {};
    return p.client_name.toLowerCase().includes(q.toLowerCase()) ||
           (fd.email || '').toLowerCase().includes(q.toLowerCase()) ||
           (fd.phone || '').includes(q);
  });
  renderProjects(filtered);
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ── DETAIL ────────────────────────────────────────────────
async function openDetail(id) {
  document.getElementById('detailOverlay').classList.add('open');
  document.getElementById('detailContent').innerHTML = '<div class="loading">Cargando...</div>';

  const [projRes, notesRes] = await Promise.all([
    fetch(`${API}/projects/${id}`),
    fetch(`${API}/projects/${id}/notes`),
  ]);
  const { project } = await projRes.json();
  const { notes }   = await notesRes.json();

  document.getElementById('detailTitle').textContent = project.client_name;
  const fd = project.form_data || {};

  const rows = [
    ['Email',     fd.email],
    ['Teléfono',  fd.phone],
    ['Instagram', fd.instagram],
    ['Deadline',  fd.deadline],
    ['Objetivos', Array.isArray(fd.main_goals) ? fd.main_goals.join(', ') : fd.main_goals],
    ['Funciones', Array.isArray(fd.special_functions) ? fd.special_functions.join(', ') : fd.special_functions],
    ['Servicios', fd.services],
    ['Colores',   fd.brand_colors],
    ['Descripción', fd.description],
    ['Notas',     fd.extra_notes],
  ].filter(([,v]) => v);

  const date = new Date(project.created_at).toLocaleString('es-AR');

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-section">
      <div class="detail-section-title">Estado del proyecto</div>
      <select class="status-select" onchange="updateStatus(${id}, this.value)">
        <option value="pending"     ${project.status==='pending'?'selected':''}>🟡 Pendiente</option>
        <option value="in_progress" ${project.status==='in_progress'?'selected':''}>🔵 En curso</option>
        <option value="completed"   ${project.status==='completed'?'selected':''}>✅ Completado</option>
        <option value="archived"    ${project.status==='archived'?'selected':''}>📦 Archivado</option>
      </select>
      <div style="margin-top:8px;font-size:.7rem;color:var(--muted);font-weight:700;">Recibido: ${date}</div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Información del cliente</div>
      ${rows.map(([l,v]) => `
        <div class="detail-row">
          <div class="detail-label">${l}</div>
          <div class="detail-value">${v}</div>
        </div>`).join('')}
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Notas internas</div>
      <div id="notesList">
        ${notes.length ? notes.map(n => noteHtml(n)).join('') : '<div style="font-size:.8rem;color:var(--muted);padding:8px 0;">Sin notas aún.</div>'}
      </div>
      <div class="note-input-wrap">
        <textarea class="note-input" id="noteInput" rows="2" placeholder="Agregar nota interna..."></textarea>
        <button class="btn-note" onclick="addNote(${id})">+ Nota</button>
      </div>
    </div>`;
}

function noteHtml(n) {
  const d = new Date(n.created_at).toLocaleString('es-AR');
  return `<div class="note" id="note-${n.id}">
    <div class="note-text">${n.content}</div>
    <div class="note-meta">
      <span class="note-date">${d}</span>
      <button class="btn-del-note" onclick="deleteNote(${n.id})">Eliminar</button>
    </div>
  </div>`;
}

function closeDetail(e) {
  if (e.target === document.getElementById('detailOverlay')) closeDetailPanel();
}
function closeDetailPanel() {
  document.getElementById('detailOverlay').classList.remove('open');
  loadProjects();
}

async function updateStatus(id, status) {
  await fetch(`${API}/projects/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status }),
  });
}

async function addNote(projectId) {
  const input = document.getElementById('noteInput');
  const content = input.value.trim();
  if (!content) return;
  const res = await fetch(`${API}/projects/${projectId}/notes`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content }),
  });
  const data = await res.json();
  if (data.success) {
    input.value = '';
    const list = document.getElementById('notesList');
    const now = new Date().toISOString();
    list.insertAdjacentHTML('beforeend', noteHtml({ id: data.note_id, content, created_at: now }));
  }
}

async function deleteNote(id) {
  if (!confirm('¿Eliminar esta nota?')) return;
  await fetch(`${API}/notes/${id}`, { method: 'DELETE' });
  document.getElementById(`note-${id}`)?.remove();
}

// ── HELPERS ───────────────────────────────────────────────
function statusLabel(s) {
  return { pending: 'Pendiente', in_progress: 'En curso', completed: 'Completado', archived: 'Archivado' }[s] || s;
}
</script>
</body>
</html>
